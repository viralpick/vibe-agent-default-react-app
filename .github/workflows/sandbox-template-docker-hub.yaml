name: "Sandbox Template (OpenSandbox) Docker Hub Build & Push"

on:
  push:
    branches: [main]
    paths:
      - opensandbox.Dockerfile
      - .github/workflows/sandbox-template-docker-hub.yaml
  workflow_dispatch:
    inputs:
      image_tag:
        description: "이미지 태그 (예: v1.0.0). 비우면 커밋 sha(sha-<short>)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  push-image:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          # workflow_dispatch 에서 image_tag 주면 그걸, 아니면(자동 push/입력 비움) 커밋 sha 사용
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build, tag, and push
        env:
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          IMAGE_NAME: agentos-view-gen
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f opensandbox.Dockerfile \
            --build-arg CACHEBUST=${{ github.run_id }} \
            -t $DOCKERHUB_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG .
          docker push $DOCKERHUB_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG

          docker tag $DOCKERHUB_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_NAMESPACE/$IMAGE_NAME:latest
          docker push $DOCKERHUB_NAMESPACE/$IMAGE_NAME:latest
          echo "Pushed: $DOCKERHUB_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG"
